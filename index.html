<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roll to the Cup</title>
  </head>
  <body>
    <div id="debug-bar">
      <label for="level-select">Go to level</label>
      <select id="level-select">
        <option value="Level1">Level 1</option>
        <option value="Level2">Level 2</option>
        <option value="Level3">Level 3</option>
        <option value="Level4">Level 4</option>
      </select>
    </div>
    <div id="game-layout">
      <div id="app"></div>
      <div id="controls">
        <div id="tool-palette" role="group" aria-label="Elements">
          <button id="tool-board" class="tool-button" type="button" title="Board" aria-label="Board" aria-pressed="false">
            <svg viewBox="0 0 40 40" width="30" height="30" aria-hidden="true">
              <rect x="4" y="16" width="32" height="8" rx="2" fill="#6d4c41" stroke="#3e2723" stroke-width="1.5" transform="rotate(-18 20 20)" />
            </svg>
          </button>
          <button id="tool-spring" class="tool-button" type="button" title="Spring" aria-label="Spring" aria-pressed="false">
            <svg viewBox="0 0 40 40" width="30" height="30" aria-hidden="true">
              <rect x="12" y="8" width="16" height="24" rx="2" fill="#ffa000" stroke="#3e2723" stroke-width="1.5" />
              <polyline points="16,30 24,24 16,18 24,12" fill="none" stroke="#3e2723" stroke-width="2" stroke-linejoin="round" />
            </svg>
          </button>
        </div>
        <label for="gravity-slider">Gravity</label>
        <input
          id="gravity-slider"
          type="range"
          min="0"
          max="3"
          step="0.05"
          value="1"
          orient="vertical"
        />
        <output id="gravity-value" for="gravity-slider">1.00</output>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
